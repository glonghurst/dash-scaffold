<!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DASH</title>
  <style>
    html, body {
      margin: 0;
    padding: 0;
    height: 100%;
    background: #000000;
    overflow: hidden;
}
  body {
        display: flex;
    align-items: center;
    justify-content: center;
}
  .dash {
        font-family: 'Courier New', Courier, monospace;
    font-weight: bold;
    font-size: 18vw;
    letter-spacing: 0.05em;
    color: #33ff66;
    text-shadow:
      0 0 5px #33ff66,
            0 0 15px #33ff66,
            0 0 30px #14ff4c,
            0 0 60px #0dff3f;
    user-select: none;
}
  .cursor {
        display: inline-block;
    width: 0.5ch;
    background: #33ff66;
    box-shadow: 0 0 10px #33ff66, 0 0 20px #33ff66;
    animation: blink 1s steps(1) infinite;
    margin-left: 0.05em;
}
  @keyframes blink {
        0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
}
  .footer {
        position: fixed;
    bottom: 24px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Courier New', Courier, monospace;
    font-size: 12px;
    color: #1a6b33;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
</style>
  </head>
  <body>
    <div class="dash">DASH<span class="cursor">&nbsp;</span></div>
    <div class="footer">scaffold v0.1 // hello world</div>
</body>
  </html>
